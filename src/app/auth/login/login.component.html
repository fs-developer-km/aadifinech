<div class="popup-overlay" (click)="close()">
  <div class="popup-box" (click)="$event.stopPropagation()">

    <!-- Close Button -->
    <button class="close-btn" (click)="close()">
      <svg class="close-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <!-- Logo Section -->
    <div class="logo-section">
      <div class="d-flex">
        <div class="logo-icon">
          <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                  d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <h2 class="logo-text">AadiFintech</h2>
      </div>
      <p class="subtitle">
        {{ mode === 'login' ? 'Welcome! Please login to continue' : 'Create your account' }}
      </p>
    </div>

    <!-- 🔄 Loader -->
    <!-- <div class="loader" *ngIf="loading">
      <div class="spinner"></div>
    </div> -->

    <!-- Loader -->
<div class="loader-overlay" *ngIf="loading">
  <div class="loader"></div>
</div>

    <!-- ✅ Success & ❌ Error Messages -->
    <div *ngIf="successMessage" class="message success">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="message error">{{ errorMessage }}</div>

    <!-- Login / Signup Form -->
    <form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form" [class.disabled]="loading">

      <!-- Name Field (Signup only) -->
      <div class="form-group" *ngIf="mode === 'signup'">
        <label class="label">Full Name</label>
        <div class="input-wrapper">
          <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <input 
            type="text" 
            formControlName="name"
            class="input-field" 
            [ngClass]="{'input-error': getFieldError('name')}"
            placeholder="Enter your full name" />
        </div>
        <div class="error-text" *ngIf="getFieldError('name')">
          {{ getFieldError('name') }}
        </div>
      </div>

      <!-- Mobile Number -->
      <div class="form-group">
        <label class="label">Mobile Number</label>
        <div class="input-wrapper">
          <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
          </svg>
          <input 
            type="tel" 
            formControlName="mobile"
            class="input-field" 
            [ngClass]="{'input-error': getFieldError('mobile')}"
            placeholder="Enter mobile number" />
        </div>
        <div class="error-text" *ngIf="getFieldError('mobile')">
          {{ getFieldError('mobile') }}
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="label">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
          </svg>
          <input 
            type="password" 
            formControlName="password"
            class="input-field" 
            [ngClass]="{'input-error': getFieldError('password')}"
            placeholder="Enter password" />
        </div>
        <div class="error-text" *ngIf="getFieldError('password')">
          {{ getFieldError('password') }}
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="login-btn" [disabled]="!loginForm.valid || loading">
        <span>{{ mode === 'login' ? 'Login' : 'Signup' }}</span>
        <svg class="arrow-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
        </svg>
      </button>
    </form>

    <!-- Footer Links -->
    <div class="footer-links">
      <a href="javascript:void(0)" class="link">Forgot Password?</a>
      <span class="divider">|</span>
      <a href="javascript:void(0)" class="link" *ngIf="mode === 'login'"
         (click)="switchMode()">Create Account</a>
      <a href="javascript:void(0)" class="link" *ngIf="mode === 'signup'"
         (click)="switchMode()">Already have an account? Login</a>
    </div>

  </div>
</div>
